name: DevSecOps Learning Pipeline

# This workflow is intentionally verbose and heavily commented.
# It demonstrates the first two LCRA-aligned learning blocks:
#   1) Code scanning / secret scanning / dependency scanning
#   2) Container scanning (Trivy) and Infrastructure as Code scanning (Checkov)
#
# Important mental model:
# - CodeQL uploads alerts to GitHub Code Scanning.
# - Gitleaks, pip-audit, Trivy, and Checkov can fail the job directly based on findings.
# - In real enterprise CI/CD, all of these together form layered guardrails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scheduled rescan so security checks still run even when no new code is pushed.
    - cron: '24 3 * * 1'

permissions:
  # Read repository contents so Actions can fetch code.
  contents: read
  # Read Actions metadata.
  actions: read
  # Write CodeQL findings back into GitHub code scanning.
  security-events: write

env:
  # Future-proof JavaScript based actions against old Node runtimes on GitHub runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Reuse the same image name across build and scan steps.
  IMAGE_NAME: agent-threat-ai-learning

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          # Install application requirements so CodeQL and pip-audit can inspect a realistic environment.
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # We are scanning Python in this learning repo.
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

      - name: Secret scan with Gitleaks
        uses: gacts/gitleaks@v1.3.2
        with:
          # Custom config extends defaults and lets you control what counts as a leak.
          config-path: .gitleaks.toml

      - name: Python dependency scan with pip-audit
        run: |
          # This is Software Composition Analysis (SCA) for Python packages.
          pip install pip-audit
          pip-audit

      - name: Build container image for Trivy scan
        run: |
          # Build the local image from Dockerfile so Trivy can inspect OS packages and app dependencies.
          docker build -t $IMAGE_NAME:latest .

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: AWS IaC scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          # Scan only the intentionally insecure demo Terraform for learning purposes.
          directory: iac-demo/aws/secure
          framework: terraform
          output_format: cli
          # Fail when Checkov finds policy violations.
          soft_fail: false

      - name: AWS IaC scan with Checkov Insecure
        uses: bridgecrewio/checkov-action@master
        with:
          # Scan only the intentionally insecure demo Terraform for learning purposes.
          directory: iac-demo/aws/insecure
          framework: terraform
          output_format: cli
          # Fail when Checkov finds policy violations.
          soft_fail: false

      - name: Azure IaC scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          # Scan only the intentionally insecure demo Terraform for learning purposes.
          directory: iac-demo/azure
          framework: terraform
          output_format: cli
          # Fail when Checkov finds policy violations.
          soft_fail: false
